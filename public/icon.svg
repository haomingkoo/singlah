<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Microphone body -->
  <rect x="216" y="120" width="80" height="160" rx="40" fill="url(#accent)"/>
  <!-- Microphone arc -->
  <path d="M176 260 a80 80 0 0 0 160 0" fill="none" stroke="#38bdf8" stroke-width="20" stroke-linecap="round"/>
  <!-- Microphone stand -->
  <line x1="256" y1="340" x2="256" y2="390" stroke="#38bdf8" stroke-width="20" stroke-linecap="round"/>
  <!-- Lyrics lines -->
  <rect x="140" y="380" width="232" height="10" rx="5" fill="#38bdf8" opacity="0.7"/>
  <rect x="170" y="400" width="172" height="8" rx="4" fill="#94a3b8" opacity="0.5"/>
</svg>
